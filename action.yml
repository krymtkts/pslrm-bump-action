name: pslrm-bump-action
description: Update a pslrm lockfile and open or update a pull request.

inputs:
  project-path:
    description: Path to the target pslrm project root or a path below it. The action resolves the directory that contains psreq.psd1.
    required: false
    default: .
  target-powershell-edition:
    description: PowerShell edition used to run action steps. Use core for pwsh or desktop for Windows PowerShell on Windows runners.
    required: false
    default: core
  # NOTE: Use a PAT when the bump branch or PR must trigger follow-up GitHub Actions workflows.
  # NOTE: Pushes made with the default GITHUB_TOKEN usually do not start new workflow runs.
  github-token:
    description: Token for git and GitHub operations such as branch push and pull request creation. Use a PAT when you want follow-up GitHub Actions workflows to run.
    required: true

outputs:
  result:
    description: Final action result. One of `no_change`, `created`, `updated`, or `noop`.
    value: ${{ steps.finalize.outputs.result }}
  bump_branch_name:
    description: Bump branch name associated with the run. Empty when `result=no_change`.
    value: ${{ steps.finalize.outputs.bump_branch_name }}
  pull_request_number:
    description: Pull request number associated with the run. Empty when `result=no_change`.
    value: ${{ steps.finalize.outputs.pull_request_number }}

runs:
  using: composite
  steps:
    - name: Validate target PowerShell edition
      shell: ${{ runner.os == 'Windows' && inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        RUNNER_OS: ${{ runner.os }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        switch ($env:TARGET_POWERSHELL_EDITION) {
          'core' {
            break
          }
          'desktop' {
            if ($env:RUNNER_OS -ne 'Windows') {
              throw "target-powershell-edition '$env:TARGET_POWERSHELL_EDITION' is not supported on non-Windows runners. Use 'core'."
            }
            break
          }
          default {
            if ($env:RUNNER_OS -eq 'Windows') {
              throw "Unsupported target-powershell-edition '$env:TARGET_POWERSHELL_EDITION'. Use 'core' or 'desktop'."
            }

            throw "Unsupported target-powershell-edition '$env:TARGET_POWERSHELL_EDITION'. Use 'core'."
          }
        }

    - name: Bootstrap bundled pslrm
      id: bootstrap
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        $bootstrapScriptPath = Join-Path $env:ACTION_PATH 'scripts/Initialize-PslrmBootstrap.ps1'
        $pslrmVersionPath = Join-Path $env:ACTION_PATH 'pslrm-version.psd1'
        $bootstrapParams = @{
          TargetPowerShellEdition = $env:TARGET_POWERSHELL_EDITION
          PslrmVersionPath = $pslrmVersionPath
        }
        # NOTE: Bootstrap returns a manifest path because RequiredVersion cannot select prerelease builds.
        $pslrmModulePath = & $bootstrapScriptPath @bootstrapParams

        "pslrm_module_path=$pslrmModulePath" >> $env:GITHUB_OUTPUT

    - name: Invoke bump action
      id: invoke
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        PSLRM_MODULE_PATH: ${{ steps.bootstrap.outputs.pslrm_module_path }}
        PROJECT_PATH: ${{ inputs.project-path }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        Import-Module $env:PSLRM_MODULE_PATH -Force

        $scriptPath = Join-Path $env:ACTION_PATH 'scripts/Invoke-BumpAction.ps1'
        $invokeParams = @{
          ProjectPath = $env:PROJECT_PATH
          TargetPowerShellEdition = $env:TARGET_POWERSHELL_EDITION
        }
        & $scriptPath @invokeParams

    - name: Commit and push lockfile
      id: branch
      if: ${{ steps.invoke.outputs.changed == 'true' }}
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        BUMP_BRANCH_NAME: ${{ steps.invoke.outputs.bump_branch_name }}
        BUMP_COMMIT_MESSAGE: ${{ steps.invoke.outputs.bump_commit_message }}
        GH_TOKEN: ${{ inputs.github-token }}
        LOCKFILE_PATH: ${{ steps.invoke.outputs.lockfile_path }}
        REPOSITORY_ROOT: ${{ steps.invoke.outputs.repository_root }}
        REPOSITORY_FULL_NAME: ${{ github.repository }}
      run: |
        $scriptPath = Join-Path $env:ACTION_PATH 'scripts/Invoke-BumpBranchPush.ps1'
        & $scriptPath

    - name: Create or update pull request
      id: pr
      if: ${{ steps.invoke.outputs.changed == 'true' }}
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        BASE_BRANCH: ${{ steps.invoke.outputs.base_branch }}
        BUMP_BRANCH_NAME: ${{ steps.invoke.outputs.bump_branch_name }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_BODY: ${{ steps.invoke.outputs.bump_pr_body }}
        PR_TITLE: ${{ steps.invoke.outputs.bump_pr_title }}
        REPOSITORY_FULL_NAME: ${{ github.repository }}
      run: |
        $scriptPath = Join-Path $env:ACTION_PATH 'scripts/Invoke-BumpPullRequest.ps1'
        & $scriptPath

    - name: Finalize action outputs
      id: finalize
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        BRANCH_ACTION: ${{ steps.branch.outputs.branch_action }}
        BUMP_BRANCH_NAME: ${{ steps.invoke.outputs.bump_branch_name }}
        CHANGED: ${{ steps.invoke.outputs.changed }}
        PR_ACTION: ${{ steps.pr.outputs.pull_request_action }}
        PULL_REQUEST_NUMBER: ${{ steps.pr.outputs.pull_request_number }}
      run: |
        if ($env:CHANGED -ne 'true') {
          "result=no_change" >> $env:GITHUB_OUTPUT
          "bump_branch_name=" >> $env:GITHUB_OUTPUT
          "pull_request_number=" >> $env:GITHUB_OUTPUT
          return
        }

        if ([string]::IsNullOrWhiteSpace($env:PR_ACTION)) {
          throw 'Failed to resolve the final pull request action.'
        }

        if ([string]::IsNullOrWhiteSpace($env:BUMP_BRANCH_NAME)) {
          throw 'Failed to resolve the final bump branch name.'
        }

        if ([string]::IsNullOrWhiteSpace($env:PULL_REQUEST_NUMBER)) {
          throw 'Failed to resolve the final pull request number.'
        }

        $result = if ($env:PR_ACTION -eq 'created') {
          'created'
        }
        elseif (($env:BRANCH_ACTION -eq 'noop') -and ($env:PR_ACTION -eq 'noop')) {
          'noop'
        }
        else {
          'updated'
        }

        "result=$result" >> $env:GITHUB_OUTPUT
        "bump_branch_name=$env:BUMP_BRANCH_NAME" >> $env:GITHUB_OUTPUT
        "pull_request_number=$env:PULL_REQUEST_NUMBER" >> $env:GITHUB_OUTPUT

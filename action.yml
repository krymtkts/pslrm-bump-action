name: pslrm-bump-action
description: Update a pslrm lockfile and open or update a pull request.

inputs:
  project-path:
    description: Path to the target pslrm project root.
    required: false
    default: .
  target-powershell-edition:
    description: PowerShell edition used to update the lockfile. Use core for pwsh or desktop for Windows PowerShell.
    required: false
    default: core
  # NOTE: Use a PAT when the bump branch or PR must trigger follow-up GitHub Actions workflows.
  # NOTE: Pushes made with the default GITHUB_TOKEN usually do not start new workflow runs.
  github-token:
    description: Token for git and GitHub operations such as branch push and pull request creation. Use a PAT when you want follow-up GitHub Actions workflows to run.
    required: true

outputs:
  changed:
    description: Whether the action detected a lockfile change.
    value: ${{ steps.invoke.outputs.changed }}

runs:
  using: composite
  steps:
    - name: Validate target PowerShell edition
      shell: pwsh
      env:
        RUNNER_OS: ${{ runner.os }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        switch ($env:TARGET_POWERSHELL_EDITION) {
          'core' {
            break
          }
          'desktop' {
            if ($env:RUNNER_OS -ne 'Windows') {
              throw "target-powershell-edition '$env:TARGET_POWERSHELL_EDITION' is not supported on non-Windows runners. Use 'core'."
            }
            break
          }
          default {
            if ($env:RUNNER_OS -eq 'Windows') {
              throw "Unsupported target-powershell-edition '$env:TARGET_POWERSHELL_EDITION'. Use 'core' or 'desktop'."
            }

            throw "Unsupported target-powershell-edition '$env:TARGET_POWERSHELL_EDITION'. Use 'core'."
          }
        }

    - name: Bootstrap bundled pslrm
      id: bootstrap
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        $bootstrapScriptPath = Join-Path $env:ACTION_PATH 'scripts/Initialize-PslrmBootstrap.ps1'
        $pslrmVersionPath = Join-Path $env:ACTION_PATH 'pslrm-version.psd1'
        $bootstrapParams = @{
          TargetPowerShellEdition = $env:TARGET_POWERSHELL_EDITION
          PslrmVersionPath = $pslrmVersionPath
        }
        # NOTE: Bootstrap returns a manifest path because RequiredVersion cannot select prerelease builds.
        $pslrmModulePath = & $bootstrapScriptPath @bootstrapParams

        "pslrm_module_path=$pslrmModulePath" >> $env:GITHUB_OUTPUT

    - name: Invoke bump action
      id: invoke
      shell: ${{ inputs.target-powershell-edition == 'desktop' && 'powershell' || 'pwsh' }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        PSLRM_MODULE_PATH: ${{ steps.bootstrap.outputs.pslrm_module_path }}
        PROJECT_PATH: ${{ inputs.project-path }}
        TARGET_POWERSHELL_EDITION: ${{ inputs.target-powershell-edition }}
      run: |
        Import-Module $env:PSLRM_MODULE_PATH -Force

        $scriptPath = Join-Path $env:ACTION_PATH 'scripts/Invoke-BumpAction.ps1'
        $invokeParams = @{
          ProjectPath = $env:PROJECT_PATH
          TargetPowerShellEdition = $env:TARGET_POWERSHELL_EDITION
        }
        & $scriptPath @invokeParams

    - name: Commit and push lockfile
      if: ${{ steps.invoke.outputs.changed == 'true' }}
      shell: pwsh
      env:
        BUMP_BRANCH_NAME: ${{ steps.invoke.outputs.bump_branch_name }}
        BUMP_COMMIT_MESSAGE: ${{ steps.invoke.outputs.bump_commit_message }}
        GH_TOKEN: ${{ inputs.github-token }}
        LOCKFILE_PATH: ${{ steps.invoke.outputs.lockfile_path }}
        REPOSITORY_ROOT: ${{ steps.invoke.outputs.repository_root }}
        REPOSITORY_FULL_NAME: ${{ github.repository }}
      run: |
        if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
          throw 'github-token is required to commit and push the updated lockfile.'
        }

        Write-Host "Preparing bump branch '$env:BUMP_BRANCH_NAME'."
        git -C $env:REPOSITORY_ROOT switch --force-create $env:BUMP_BRANCH_NAME
        git -C $env:REPOSITORY_ROOT config user.name github-actions[bot]
        git -C $env:REPOSITORY_ROOT config user.email 41898282+github-actions[bot]@users.noreply.github.com

        Push-Location $env:REPOSITORY_ROOT
        try {
          $relativeLockfilePath = Resolve-Path -LiteralPath $env:LOCKFILE_PATH -Relative
          Write-Host "Staging updated lockfile '$relativeLockfilePath'."
          git add -- $relativeLockfilePath
        }
        finally {
          Pop-Location
        }

        Write-Host "Creating bump commit '$env:BUMP_COMMIT_MESSAGE'."
        git -C $env:REPOSITORY_ROOT commit --message $env:BUMP_COMMIT_MESSAGE
        # NOTE: Use an authenticated HTTPS remote so the push runs as the supplied token identity.
        # NOTE: A PAT can trigger follow-up workflows here; the default GITHUB_TOKEN usually cannot.
        git -C $env:REPOSITORY_ROOT remote set-url origin "https://x-access-token:$env:GH_TOKEN@github.com/$env:REPOSITORY_FULL_NAME.git"
        Write-Host "Pushing bump branch '$env:BUMP_BRANCH_NAME' to '$env:REPOSITORY_FULL_NAME'."
        git -C $env:REPOSITORY_ROOT push --force-with-lease --set-upstream origin $env:BUMP_BRANCH_NAME
        Write-Host 'Bump branch push completed.'

    - name: Create or update pull request
      if: ${{ steps.invoke.outputs.changed == 'true' }}
      shell: pwsh
      env:
        BASE_BRANCH: ${{ steps.invoke.outputs.base_branch }}
        BUMP_BRANCH_NAME: ${{ steps.invoke.outputs.bump_branch_name }}
        GH_TOKEN: ${{ inputs.github-token }}
        PR_BODY: ${{ steps.invoke.outputs.bump_pr_body }}
        PR_TITLE: ${{ steps.invoke.outputs.bump_pr_title }}
        REPOSITORY_FULL_NAME: ${{ github.repository }}
      run: |
        Write-Host "Looking for an open pull request from '$env:BUMP_BRANCH_NAME' into '$env:BASE_BRANCH'."
        $existingPullRequestNumber = @(
          & gh pr list --repo $env:REPOSITORY_FULL_NAME --base $env:BASE_BRANCH --head $env:BUMP_BRANCH_NAME --state open --json number --jq '.[0].number' 2>$null
        ) | Select-Object -Last 1
        if ($LASTEXITCODE -ne 0) {
          throw 'Failed to query existing bump pull requests.'
        }

        if ([string]::IsNullOrWhiteSpace($existingPullRequestNumber)) {
          Write-Host "Creating a new bump pull request with title '$env:PR_TITLE'."
          & gh pr create --repo $env:REPOSITORY_FULL_NAME --base $env:BASE_BRANCH --head $env:BUMP_BRANCH_NAME --title $env:PR_TITLE --body $env:PR_BODY
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to create the bump pull request.'
          }

          Write-Host 'Bump pull request created.'
        }
        else {
          Write-Host "Updating existing bump pull request #$existingPullRequestNumber."
          & gh pr edit $existingPullRequestNumber --repo $env:REPOSITORY_FULL_NAME --title $env:PR_TITLE --body $env:PR_BODY
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update bump pull request #$existingPullRequestNumber."
          }

          Write-Host "Bump pull request #$existingPullRequestNumber updated."
        }

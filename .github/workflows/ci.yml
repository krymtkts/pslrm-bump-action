name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  unit:
    name: Unit (${{ matrix.runtime }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: PowerShell 7
            os: ubuntu-latest
            shell: pwsh
          - runtime: Windows PowerShell 5.1
            os: windows-latest
            shell: powershell
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore dependencies and run unit tests
        uses: ./.github/actions/restore-and-unit-test
        with:
          shell: ${{ matrix.shell }}

  smoke:
    name: Smoke no-change (${{ matrix.os }} / ${{ matrix.edition }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            edition: core
          - os: macos-latest
            edition: core
          - os: windows-latest
            edition: core
          - os: windows-latest
            edition: desktop
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # NOTE: Producer-side changed-run validation lives in unit tests so CI can exercise
      # the supported PowerShell 7 / Windows PowerShell 5.1 script paths without opening
      # real bump branches or pull requests from this repository.
      - name: Run self-test action
        id: smoke
        uses: ./
        with:
          project-path: tests/fixtures/basic-project
          target-powershell-edition: ${{ matrix.edition }}
          github-token: ${{ github.token }}

      - name: Assert result output
        shell: pwsh
        env:
          BUMP_BRANCH_NAME: ${{ steps.smoke.outputs.bump_branch_name }}
          EDITION: ${{ matrix.edition }}
          PULL_REQUEST_NUMBER: ${{ steps.smoke.outputs.pull_request_number }}
          RESULT: ${{ steps.smoke.outputs.result }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          if ($env:RESULT -ne 'no_change') {
              throw "Expected result=no_change for $env:RUNNER_OS / $env:EDITION, but got '$env:RESULT'."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:BUMP_BRANCH_NAME)) {
              throw "Expected bump_branch_name to be empty for $env:RUNNER_OS / $env:EDITION, but got '$env:BUMP_BRANCH_NAME'."
          }

          if (-not [string]::IsNullOrWhiteSpace($env:PULL_REQUEST_NUMBER)) {
              throw "Expected pull_request_number to be empty for $env:RUNNER_OS / $env:EDITION, but got '$env:PULL_REQUEST_NUMBER'."
          }

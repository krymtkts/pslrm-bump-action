name: Restore and unit test
description: Bootstrap pslrm, restore locked development dependencies, and run unit tests.

inputs:
  shell:
    description: Shell used to execute restore and unit test commands.
    required: true
  disable-coverage:
    description: Whether to disable code coverage collection.
    required: false
    default: false

runs:
  using: composite
  steps:
    - name: Bootstrap pslrm from PSGallery
      id: bootstrap
      shell: ${{ inputs.shell }}
      env:
        TARGET_POWERSHELL_EDITION: ${{ inputs.shell == 'powershell' && 'desktop' || 'core' }}
      run: |
        $bootstrapScriptPath = Join-Path $env:GITHUB_WORKSPACE 'scripts/Initialize-PslrmBootstrap.ps1'
        $pslrmVersionPath = Join-Path $env:GITHUB_WORKSPACE 'pslrm-version.psd1'
        $bootstrapParams = @{
            TargetPowerShellEdition = $env:TARGET_POWERSHELL_EDITION
            PslrmVersionPath = $pslrmVersionPath
        }
        # NOTE: Bootstrap returns a manifest path because RequiredVersion cannot select prerelease builds.
        $pslrmModulePath = & $bootstrapScriptPath @bootstrapParams

        "pslrm_module_path=$pslrmModulePath" >> $env:GITHUB_OUTPUT

    - name: Restore modules from PSGallery
      shell: ${{ inputs.shell }}
      env:
        PSLRM_MODULE_PATH: ${{ steps.bootstrap.outputs.pslrm_module_path }}
      run: |
        Import-Module $env:PSLRM_MODULE_PATH -Force
        Restore-PSLResource

    - name: Run unit tests through Invoke-Build
      shell: ${{ inputs.shell }}
      env:
        DISABLE_COVERAGE: ${{ inputs.disable-coverage }}
        PSLRM_MODULE_PATH: ${{ steps.bootstrap.outputs.pslrm_module_path }}
      run: |
        Import-Module $env:PSLRM_MODULE_PATH -Force

        $params = @{
            Tasks = 'UnitTest'
        }
        if ($env:DISABLE_COVERAGE -eq 'true') {
            $params['DisableCoverage'] = $true
        }

        & ./.build.ps1 @params
